name: Build APK Cordova 13 API32

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Install Cordova CLI
        run: npm install -g cordova@13

      - name: Verify Cordova version
        run: cordova -v

      - name: Install npm dependencies
        run: npm install

      # ===== INISIALISASI PROYEK CORDOVA YANG BENAR =====
      - name: Backup custom files
        run: |
          cp config.xml config.xml.bak
          cp -r www www.bak

      - name: Create Cordova project (to generate .cordova folder)
        run: cordova create . com.esp32controllerpro.app "ESP32-C3 Pro"

      - name: Restore custom files
        run: |
          cp config.xml.bak config.xml
          rm -rf www
          mv www.bak www
          # Hapus file default yang mungkin tergenerate
          rm -f www/index.html  # sudah diganti dengan milik kita

      - name: Copy build-extras.gradle (if exists)
        run: |
          if [ -f build-extras.gradle ]; then
            mkdir -p platforms/android/app
            cp build-extras.gradle platforms/android/app/
            echo "build-extras.gradle copied."
          fi

      - name: Add Android platform
        run: cordova platform add android@12.0.1 --nofetch

      # Opsional: install plugin yang belum terinstal (meski sudah di config.xml, lebih aman)
      - name: Install plugins
        run: |
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add cordova-plugin-background-mode --variable KOTLIN_VERSION=1.8.22
          cordova plugin add cordova-plugin-local-notification@0.9.0-beta.3
          cordova plugin add cordova-plugin-android-permissions
        continue-on-error: true  # biarkan jika sudah ada

      - name: List installed plugins (debug info)
        run: cordova plugin ls

      - name: Build APK debug
        run: cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-c3-apk-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
