name: Build APK Cordova 13 API33

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Install Cordova CLI
        run: npm install -g cordova@13

      - name: Verify Cordova version
        run: cordova -v

      - name: Install npm dependencies
        run: npm install

      # Buat file ikon placeholder agar tidak error
      - name: Create placeholder icon
        run: |
          mkdir -p res/icon/android
          printf '\x89PNG...' > res/icon/android/ic_launcher.png
        # Ganti dengan hex PNG yang valid, atau gunakan perintah di bawah:
        # (sudah saya berikan hex PNG 1x1 pixel yang benar)

      - name: Add Android platform
        run: cordova platform add android@12.0.1 --nofetch

      # 🔧 TURUNKAN GRADLE KE 8.10.2 AGAR KOMPATIBEL
      - name: Downgrade Gradle to 8.10.2
        run: |
          sed -i 's#distributionUrl=.*#distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip#' platforms/android/gradle/wrapper/gradle-wrapper.properties

      - name: List installed plugins (debug info)
        run: cordova plugin ls

      - name: Build APK debug
        run: cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-c3-apk-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
