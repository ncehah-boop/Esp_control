name: Build APK Cordova 13 API33

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Install Cordova CLI
        run: npm install -g cordova@13

      - name: Verify Cordova version
        run: cordova -v

      - name: Install npm dependencies
        run: npm install

      # Buat file ikon placeholder agar tidak error
      - name: Create placeholder icon
        run: |
          mkdir -p res/icon/android
          # Buat file PNG 1x1 pixel hitam (valid PNG minimal)
          printf '\x89\x50\x4E\x47\x0D\x0A\x1A\x0A\x00\x00\x00\x0D\x49\x48\x44\x52\x00\x00\x00\x01\x00\x00\x00\x01\x08\x02\x00\x00\x00\x90\x77\x53\xDE\x00\x00\x00\x0C\x49\x44\x41\x54\x08\xD7\x63\xF8\xCF\xC0\x00\x00\x00\x03\x00\x01\x4A\xC6\xD3\xE1\x00\x00\x00\x00\x49\x45\x4E\x44\xAE\x42\x60\x82' > res/icon/android/ic_launcher.png

      - name: Add Android platform
        run: cordova platform add android@12.0.1 --nofetch

      - name: List installed plugins (debug info)
        run: cordova plugin ls

      - name: Build APK debug
        run: cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-c3-apk-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
